<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Workflow Runner</title>
    <link rel="stylesheet" href="{{ url_for('dev_runner.static', filename='runner.css') }}">
</head>
<body>
    <header class="top-bar">
        <h1>Dev Workflow Runner</h1>
        <div class="controls">
            <select id="workflow-select">
                <option value="">워크플로 선택...</option>
            </select>
            <button id="btn-reset" title="State 초기화">Reset</button>
            <button id="btn-reload" title="워크플로 목록 새로고침">Reload</button>
            <div class="export-group">
                <button id="btn-export-json" title="Transcript를 JSON으로 내보내기">Export JSON</button>
                <button id="btn-export-txt" title="Transcript를 TXT로 내보내기">Export TXT</button>
            </div>
        </div>
    </header>

    <main class="panels">
        <section class="panel panel-message">
            <h2>Message</h2>
            <div id="transcript" class="transcript"></div>
            <form id="message-form" class="input-area">
                <input type="text" id="message-input" placeholder="메시지를 입력하세요..." autocomplete="off">
                <button type="submit">전송</button>
            </form>
        </section>

        <aside class="panel-right">
            <section class="panel panel-state">
                <h2>State</h2>
                <pre id="state-view" class="json-view">워크플로를 선택하세요.</pre>
            </section>

            <section class="panel panel-trace">
                <h2>Trace</h2>
                <div id="trace-view" class="trace-list">실행 후 trace가 표시됩니다.</div>
            </section>
        </aside>
    </main>

    <script src="{{ url_for('dev_runner.static', filename='runner.js') }}"></script>
</body>
</html>
