<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signal Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      color: #18211d;
      background: linear-gradient(135deg, #f9f4eb, #efe5d4);
      display: flex;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 0.7rem;
      background: linear-gradient(135deg, #085746, #0d7c66);
      color: #fff;
      font-weight: 700;
    }

    .brand span:last-child {
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .card {
      background: rgba(255, 250, 242, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 1.25rem;
      padding: 1.5rem;
      box-shadow: 0 12px 36px rgba(34, 45, 40, 0.1);
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(24, 33, 29, 0.08);
      font-size: 0.95rem;
    }

    .status-row:last-child { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .badge-ok { background: rgba(13, 124, 102, 0.14); color: #085746; }
    .badge-busy { background: rgba(216, 140, 58, 0.18); color: #8b5a1a; }

    footer {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #5d675f;
      text-align: center;
    }

    @media (max-width: 480px) {
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <span class="brand-mark">S</span>
      <span>Signal Room</span>
    </div>

    <div class="card">
      <h2>Server Status</h2>
      <p style="color:#5d675f; margin-bottom:1rem; font-size:0.92rem;">
        Cube 챗봇 서버 &mdash; OSS Agent (One Stop Solution) 연동
      </p>
      <div class="status-row">
        <span>Cube Receiver</span>
        <span class="badge badge-ok">online</span>
      </div>
      <div class="status-row">
        <span>LLM Agent</span>
        <span class="badge badge-ok">ready</span>
      </div>
      <div class="status-row">
        <span>Conversation Store</span>
        <span class="badge badge-ok">connected</span>
      </div>
    </div>

    <footer>Signal Room &mdash; Cube Chatbot Server for OSS Agent</footer>
  </div>
</body>
</html>
