[uwsgi]
module = index:app

# Process management
master = true
vacuum = true
die-on-term = true
need-app = true
single-interpreter = true

# 4 vCPU / 8 GiB 기준 튜닝
# - workers: CPU 병렬성과 안정성 균형
# - threads: CDN/HTTP I/O 동시성 확보
workers = 3
threads = 2
enable-threads = true
thunder-lock = true
lazy-apps = true

# Touch-reload — touch restart.txt로 서버 재시작
touch-reload = /project/workSpace/restart.txt

# Immediate restart policy (touch-reload 시 실행 중 잡 즉시 종료)
reload-mercy = 0
worker-reload-mercy = 0
max-requests = 1500
max-requests-delta = 100
reload-on-rss = 700

# Timeouts
harakiri = 120
http-timeout = 120
socket-timeout = 120

# Buffering / queue
listen = 512
buffer-size = 65535
post-buffering = 65535

# Logging
log-date = true
daemonize = ./logs/uwsgi-@(exec://date +%%Y-%%m-%%d).log
