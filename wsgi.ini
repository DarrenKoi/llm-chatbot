[uwsgi]
module = index:app
# Workers — 적은 수로 시작 (LLM 호출은 ThreadPoolExecutor에서 처리)
workers = 2
threads = 4
enable-threads = true

# Touch-reload — touch restart.txt로 서버 재시작
touch-reload = restart.txt

# Graceful restart
reload-mercy = 10
worker-reload-mercy = 10

# Logging
log-date = true
logto = /dev/stdout

# Process management
master = true
vacuum = true
die-on-term = true

# Buffering
buffer-size = 65535
post-buffering = 65535

# Harakiri — LLM 응답 대기 시간을 고려한 타임아웃
harakiri = 120
